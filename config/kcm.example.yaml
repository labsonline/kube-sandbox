---
replicas: 1
imagePullSecrets: []
image:
  repository: registry.mirantis.com/k0rdent-enterprise/kcm-controller
  tag: 1.2.2
  pullPolicy: IfNotPresent
controller:
  templatesRepoURL: oci://registry.mirantis.com/k0rdent-enterprise/charts
  globalRegistry: registry.mirantis.com/k0rdent-enterprise
  globalK0sURL: https://get.mirantis.com/k0rdent-enterprise/k0s
  createManagement: false
  createAccessManagement: false
  createRelease: false
  # createTemplates: true
  nodeSelector: {}
  affinity: {}
  tolerations: []
flux2:
  kustomizeController:
    create: true
    container:
      additionalArgs:
        - --watch-label-selector=k0rdent.mirantis.com/managed=true
resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi
k0rdent-ui:
  enabled: false
  # auth:
  #   basic:
  #     enabled: true
  #     username: admin
  #     password: k0rdent
  #     secretKeyRef:
  #       key: ''
  #       name: ''
regional:
  telemetry:
    # [disabled, local, online]
    mode: disabled
